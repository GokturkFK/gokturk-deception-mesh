name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"

jobs:
  build-test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gokturk
          POSTGRES_PASSWORD: gokturk
          POSTGRES_DB: gokturk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gokturk"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check for Go source files
        id: gofiles
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Henuz .go dosyasi yok — vet/build/test/coverage core paketler gelince aktiflesecek (bkz. PROJECT PLAN.md)."
          fi

      - name: go vet
        if: steps.gofiles.outputs.found == 'true'
        run: go vet ./...

      - name: Build
        if: steps.gofiles.outputs.found == 'true'
        run: go build ./...

      - name: Test (race detector + coverage)
        if: steps.gofiles.outputs.found == 'true'
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Coverage gate (>= 70% once core packages land)
        if: steps.gofiles.outputs.found == 'true'
        run: |
          go tool cover -func=coverage.txt > coverage.summary.txt || true
          TOTAL=$(grep total coverage.summary.txt | awk '{print $3}' | tr -d '%')
          if [ -z "$TOTAL" ]; then
            echo "No coverage data yet (no packages under test) — gate activates once core packages land (see PROJECT PLAN.md APP-10)."
            exit 0
          fi
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { exit (t+0 < 70) }'

      - name: Upload coverage artifact
        if: steps.gofiles.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: ignore

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check for Go source files
        id: gofiles
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: golangci/golangci-lint-action@v6
        if: steps.gofiles.outputs.found == 'true'
        with:
          version: latest
