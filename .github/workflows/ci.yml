name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  build-test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gokturk
          POSTGRES_PASSWORD: gokturk
          POSTGRES_DB: gokturk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gokturk"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check for Go source files
        id: gofiles
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Henuz .go dosyasi yok — vet/build/test/coverage core paketler gelince aktiflesecek (bkz. PROJECT PLAN.md)."
          fi

      - name: go vet
        if: steps.gofiles.outputs.found == 'true'
        run: go vet ./...

      - name: Build
        if: steps.gofiles.outputs.found == 'true'
        run: go build ./...

      - name: Test (race detector, all packages)
        if: steps.gofiles.outputs.found == 'true'
        run: go test -race ./...

      - name: Check for core (internal/) source files
        id: corefiles
        run: |
          if find ./internal -name '*.go' 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::internal/ altinda henuz .go dosyasi yok — coverage gate core paketler gelince aktiflesecek (bkz. PROJECT PLAN.md APP-10)."
          fi

      - name: Coverage (core packages only)
        if: steps.corefiles.outputs.found == 'true'
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./internal/...

      - name: Coverage gate (>= 70% on core packages)
        if: steps.corefiles.outputs.found == 'true'
        run: |
          go tool cover -func=coverage.txt > coverage.summary.txt || true
          TOTAL=$(grep total coverage.summary.txt | awk '{print $3}' | tr -d '%')
          if [ -z "$TOTAL" ]; then
            echo "No coverage data yet (no packages under test) — gate activates once core packages land (see PROJECT PLAN.md APP-10)."
            exit 0
          fi
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { exit (t+0 < 70) }'

      - name: Upload coverage artifact
        if: steps.corefiles.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: ignore

  dashboard-tests:
    name: Dashboard tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: dashboard/requirements.txt

      - name: Install dependencies
        run: pip install -r dashboard/requirements.txt pytest

      - name: pytest
        run: pytest dashboard/tests -v

  docker-dashboard:
    name: Docker build (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deployments/docker/dashboard.Dockerfile -t gokturk/dashboard:ci .
      - name: Trivy scan (fail on HIGH/CRITICAL, fixli CVE'ler)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gokturk/dashboard:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  docker-control-api:
    name: Docker build (control-api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deployments/docker/control-api.Dockerfile -t gokturk/control-api:ci .
      - name: Smoke test (healthcheck subcommand exits nonzero without server)
        run: |
          if docker run --rm gokturk/control-api:ci healthcheck; then
            echo "healthcheck calisan server olmadan 0 dondu — beklenmiyor"; exit 1
          fi
          echo "OK: healthcheck server yokken nonzero dondu"
      - name: Trivy scan (fail on HIGH/CRITICAL, fixli CVE'ler)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gokturk/control-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  publish-control-api:
    name: Publish control-api (SBOM + sign)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, docker-control-api, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image repo (GHCR repository adlari kucuk harf olmali)
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/docker/control-api.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/control-api:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/control-api:latest

      - name: SBOM (syft, SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.repo.outputs.name }}/control-api@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-control-api.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-control-api
          path: sbom-control-api.spdx.json

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless / OIDC)
        run: cosign sign --yes "ghcr.io/${{ steps.repo.outputs.name }}/control-api@${{ steps.build.outputs.digest }}"

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check for Go source files
        id: gofiles
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # v8 = golangci-lint v2 serisi (go1.26 ile derli); .golangci.yml v2 formatinda.
      - uses: golangci/golangci-lint-action@v8
        if: steps.gofiles.outputs.found == 'true'
        with:
          version: latest
