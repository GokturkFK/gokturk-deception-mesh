name: gokturk-deception-mesh

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gokturk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gokturk}
      POSTGRES_DB: ${POSTGRES_DB:-gokturk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gokturk}"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-api:
    build:
      context: ../../
      dockerfile: deployments/docker/control-api.Dockerfile
    environment:
      DB_DSN: postgres://${POSTGRES_USER:-gokturk}:${POSTGRES_PASSWORD:-gokturk}@postgres:5432/${POSTGRES_DB:-gokturk}?sslmode=disable
      NATS_URL: nats://nats:4222
      HMAC_KEY: ${HMAC_KEY:?HMAC_KEY .env dosyasinda tanimlanmali}
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # distroless image'da wget yok; binary'nin healthcheck alt komutu kullaniliyor.
      test: ["CMD", "/control-api", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  # TODO(Cyber, OPS-5): deployments/docker/sensor-ssh.Dockerfile henüz yok.
  # auth.log mount'u Debian/Ubuntu varsayar; APP-4 journald okuyucu olarak yazılırsa
  # bunun yerine /var/log/journal:/var/log/journal:ro + farklı bir okuma stratejisi gerekir.
  sensor-ssh:
    build:
      context: ../../
      dockerfile: deployments/docker/sensor-ssh.Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      AUTH_LOG_PATH: /var/log/auth.log
    volumes:
      - /var/log/auth.log:/var/log/auth.log:ro
    depends_on:
      nats:
        condition: service_healthy

  # TODO(Cyber): mevcut Streamlit GÖKTÜRK panelinin kodu bu repoya taşınınca
  # context/dockerfile yolu güncellenecek.
  dashboard:
    build:
      context: ../../
      dockerfile: deployments/docker/dashboard.Dockerfile
    environment:
      CONTROL_API_URL: http://control-api:8080
    ports:
      - "8501:8501"
    depends_on:
      control-api:
        condition: service_healthy

  # Demo SIEM alıcısı — alarmların syslog CEF olarak gerçekten dışarı çıktığını
  # göstermek için (bkz. PROJECT PLAN.md APP-8 AC). docker compose logs siem-sink
  # ile gelen CEF mesajları izlenebilir.
  siem-sink:
    image: alpine:3.20
    command: >
      sh -c "apk add --no-cache socat >/dev/null &&
             echo 'siem-sink: udp/514 dinleniyor (CEF demo alicisi)' &&
             socat -u UDP-RECVFROM:514,fork,reuseaddr -"
    ports:
      - "514:514/udp"

volumes:
  pgdata:
