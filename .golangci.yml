# golangci-lint v2 formati (action@v8 / binary v2.x).
# Not: gosimple v2'de staticcheck icine katildi; gofmt/goimports "formatters" altinda.
version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        # Turkce godoc stili ("X, ... yapar") virgul nedeniyle exported
        # kuralinin bicim denetimine takiliyor; ekip stili korunuyor.
        - name: exported
          disabled: true
  exclusions:
    rules:
      # Testlerdeki sahte secret'lar (G101 vb.) gercek sizinti degildir;
      # v1'in varsayilan davranisiyla ayni.
      - path: _test\.go
        linters:
          - gosec
    paths:
      - deployments
      - migrations
      - scripts

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - deployments
      - migrations
      - scripts
